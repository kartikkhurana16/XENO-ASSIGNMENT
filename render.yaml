# Render Blueprint — free tier, auto-generated *.onrender.com URLs
# Deploy: https://dashboard.render.com → New → Blueprint → connect this repo

services:
  - type: web
    name: xeno-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        fromService:
          type: web
          name: xeno-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: xeno-frontend
    runtime: static
    plan: free
    rootDir: verifier
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: xeno-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
